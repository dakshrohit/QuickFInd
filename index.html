<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocomplete with Algorithms</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <div class="container">
            <h1>QuickFind</h1>
            <p>Enter Name of City To Search</p> 
            <p id="city-count">Loading city data...</p> 
            <input type="text" id="autocomplete-input" 
            placeholder="Start typing..." 
            oninput="window.autocomplete()">
            <select id="algorithm">
            <option value="single-hashing">Single String Hashing</option>
            <option value="double-hashing">Double String Hashing</option>
            <option value="kmp">Knuth-Morris-Pratt (KMP)</option>
            <option value="trie">Trie</option>
            </select>
            
            <div class="visualizer-controls" style="margin-bottom: 10px; display: flex; gap: 10px; align-items: center; justify-content: center; color: #eee; flex-wrap: wrap;">
                <label style="cursor: pointer;">
                    <input type="checkbox" id="fuzzy-toggle"> 
                    Enable Typo Tolerance
                </label>
                <label style="cursor: pointer;">
                    <input type="checkbox" id="visualizer-toggle" onchange="window.toggleVisualizerMode()"> 
                    Enable Visualizer Mode
                </label>
                <select id="sample-word" style="display: none; width: auto; margin-bottom: 0;">
                    <option value="washington">Washington</option>
                    <option value="san francisco">San Francisco</option>
                    <option value="new york">New York</option>
                    <option value="los angeles">Los Angeles</option>
                    <option value="chicago">Chicago</option>
                </select>
            </div>

            <div id="time-taken"></div>
            <ul id="suggestions"></ul>
            
            <div id="visualizer-container" style="display: none; text-align: center; margin-top: 20px; padding: 15px; border: 1px solid #777; border-radius: 8px; background-color: #2a2a2a;">
                <h2 style="margin-top: 0; color: #f0ad4e;">Algorithm Visualizer</h2>
                <div id="visualizer-info" style="margin-bottom: 15px; font-family: monospace; font-size: 16px;"></div>
                <div id="visualizer-blocks" style="display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; margin-bottom: 15px;"></div>
                <div id="visualizer-status" style="margin-top: 15px; font-weight: bold; font-size: 18px;"></div>
            </div>
            <div class="average-times-container">
            <h2>Average Search Times</h2>
            <div class="average-times">
                <p>Single String Hashing: <span id="single-hashing-average">Not used yet</span></p>
                <p>Double String Hashing: <span id="double-hashing-average">Not used yet</span></p>
                <p>KMP: <span id="kmp-average">Not used yet</span></p>
                <p>Trie: <span id="trie-average">Not used yet</span></p>
            </div>
            <canvas id="average-times-chart" width="400" height="300"></canvas>
            </div>
        </div>
    <script src="scripts.js"></script>
    </body>
</html>
